<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            padding: 40px;
        }

        h2 {
            color: #4F46E5;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background-color: #4F46E5;
            color: white !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin: 24px 0;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Xác thực tài khoản Clothing Store</h2>
        <p>Xin chào <strong th:text="${name}"></strong>,</p>
        <p>Cảm ơn bạn đã đăng ký tài khoản. Vui lòng click vào nút bên dưới để xác thực email:</p>
        <a th:href="${verifyUrl}" class="btn">Xác thực email</a>
        <p>Link có hiệu lực trong <strong>24 giờ</strong>.</p>
        <div class="footer">
            <p>Nếu bạn không đăng ký tài khoản, vui lòng bỏ qua email này.</p>
            <p>© 2026 Clothing Store. All rights reserved.</p>
        </div>
    </div>
</body>

</html>
