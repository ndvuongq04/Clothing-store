spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  application:
    name: clothing-store-be
  profiles:
    active: ${SPRING_PROFILE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/clothing_store}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:DEMO1234}
  hash-secret: ${VNPAY_HASH_SECRET:demosecretkey1234567890abcdefgh}
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  api-url: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
  return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payment/vnpay/return}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
  cookie:
    secure: true # false o dev (HTTP), true o prod (HTTPS)
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  verify-url: ${VERIFY_URL:http://localhost:5173/verify-email?token=}
  reset-password-url: ${RESET_PASSWORD_URL:http://localhost:5173/reset-password?token=}
  review-url: ${REVIEW_URL:http://localhost:5173/profile/orders}
